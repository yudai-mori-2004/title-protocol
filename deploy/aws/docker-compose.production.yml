# Title Protocol — AWS Production Docker Compose
#
# Runs Gateway + Irys Uploader sidecar as containers.
# TEE + Proxy run separately inside the Nitro Enclave (not in Docker).
#
# Note: Indexer + PostgreSQL are NOT part of node deployment.
# They are a separate concern and should be managed independently.
#
# Prerequisites:
#   - .env is configured with production values (see .env.example)
#   - TEE + Proxy are started via Enclave + systemd
#
# Usage:
#   docker compose -f deploy/aws/docker-compose.production.yml up -d

services:
  # Gateway
  gateway:
    build:
      context: ../..
      dockerfile: docker/gateway.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      # TEEはEnclave内、Proxyが localhost:4000 で中継
      TEE_ENDPOINT: "http://host.docker.internal:4000"
      # Irysサイドカーへの接続
      IRYS_UPLOADER_URL: "http://irys-uploader:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - irys-uploader

  # Irys Uploader Sidecar (Arweave永続保存)
  irys-uploader:
    build:
      context: ../..
      dockerfile: docker/irys-uploader.Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: "3001"
