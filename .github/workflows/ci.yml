name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check (workspace)
        run: cargo check --workspace

      - name: cargo check (vendor-neutral)
        run: cargo check --workspace --no-default-features --exclude title-proxy

      - name: cargo test (workspace)
        run: cargo test --workspace

      - name: cargo build WASM modules
        run: |
          for dir in wasm/*/; do
            echo "Building $dir ..."
            cargo build --manifest-path "${dir}Cargo.toml" --target wasm32-unknown-unknown --release
          done

  cargo-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0344 \
            --ignore RUSTSEC-2022-0093 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0020 \
            --ignore RUSTSEC-2026-0006 \
            --ignore RUSTSEC-2026-0021 \
            --ignore RUSTSEC-2025-0118 \
            --ignore RUSTSEC-2025-0046

  typescript-build:
    name: TypeScript Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build & Test SDK
        working-directory: sdk/ts
        run: |
          npm install
          npm run build
          npm test

      - name: Build & Test Indexer
        working-directory: indexer
        run: |
          npm install
          npm run build
          npm test
