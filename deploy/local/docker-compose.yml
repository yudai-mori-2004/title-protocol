# Title Protocol — Local Development Docker Compose
#
# PostgreSQL のみ。Gateway, TEE, TempStorage, Indexer は
# ホスト上の独立プロセスとして起動する（アーキテクチャの可視化のため）。
#
# Usage:
#   docker compose -f deploy/local/docker-compose.yml up -d

services:
  # PostgreSQL (インデクサ用)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: title_indexer
      POSTGRES_USER: title
      POSTGRES_PASSWORD: title_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U title"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
